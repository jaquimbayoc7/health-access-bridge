name: CI - Development

# ──────────────────────────────────────────────────────────────
# STAGE 1 — DEV
# Trigger: push o PR a develop
# Resultado: CI pasa → Render despliega DEV automáticamente
# Siguiente paso: abrir PR develop→staging y esperar aprobación
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  backend-test:
    name: Backend Tests (Dev)
    runs-on: ubuntu-latest
    environment: development

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hab_user
          POSTGRES_PASSWORD: hab_password
          POSTGRES_DB: hab_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://hab_user:hab_password@localhost:5432/hab_dev
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENVIRONMENT: development
        run: cd backend && alembic upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://hab_user:hab_password@localhost:5432/hab_dev
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENVIRONMENT: development
        run: cd backend && pytest app/tests/ -v --tb=short

  frontend-build:
    name: Frontend Build (Dev)
    runs-on: ubuntu-latest
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ENVIRONMENT: development
        run: cd frontend && npm run build

  notify-dev-ready:
    name: Notify DEV deploy ready
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: DEV environment ready
        run: |
          echo "✅ CI passed on develop."
          echo "🚀 Render will auto-deploy to DEV environment."
          echo "📋 Next step: open a PR from develop → staging and request approval to promote to QA."
          echo "   URL DEV backend: https://hab-backend-dev.onrender.com"
          echo "   URL DEV frontend: https://hab-frontend-dev.onrender.com"
