name: CI/CD - Production

# ──────────────────────────────────────────────────────────────────────────
# STAGE 3 — PRODUCTION
# Trigger: PR staging→master (aprobación requerida) o push a master
# Requisito previo: QA gate aprobado (promote-to-production-gate en ci-qa.yml)
# Pasos:
#   1. CI unit tests finales (Python 3.14)
#   2. Aprobación manual obligatoria (environment gate "production")
#   3. Render despliega a PROD automáticamente desde master
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-test:
    name: Backend Tests (Prod)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hab_user
          POSTGRES_PASSWORD: hab_password
          POSTGRES_DB: hab_prod_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://hab_user:hab_password@localhost:5432/hab_prod_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENVIRONMENT: production
        run: cd backend && alembic upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://hab_user:hab_password@localhost:5432/hab_prod_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENVIRONMENT: production
        run: cd backend && pytest app/tests/ -v --tb=short

  frontend-build:
    name: Frontend Build (Prod)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ENVIRONMENT: production
        run: cd frontend && npm run build

  deploy-approval:
    name: "🔐 Approval Gate — Deploy to Production"
    runs-on: ubuntu-latest
    environment: production
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Production deploy approved
        run: |
          echo "✅ Production deploy approved."
          echo "🚀 Render is deploying to PRODUCTION from master branch."
          echo "   URL PROD backend:  https://hab-backend.onrender.com"
          echo "   URL PROD frontend: https://hab-frontend.onrender.com"

  api-smoke-tests-prod:
    name: API Smoke Tests — Render PROD
    runs-on: ubuntu-latest
    needs: [deploy-approval]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Wait for Render PROD deploy to be ready
        run: |
          echo "Waiting 90s for Render PROD to finish deploying..."
          sleep 90

      - name: Health check — /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hab-backend.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ /health OK"

      - name: Smoke test — POST /api/v1/auth/login reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://hab-backend.onrender.com/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"smoke@test.com","password":"smoke"}')
          echo "Login endpoint status: $STATUS"
          if [ "$STATUS" != "422" ] && [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ]; then
            echo "❌ Auth endpoint unreachable in PROD (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ /auth/login reachable in PROD"
