name: CI/CD - QA Staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

jobs:
  backend-test:
    name: Backend Tests (QA)
    runs-on: ubuntu-latest
    environment: qa

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hab_user
          POSTGRES_PASSWORD: hab_password
          POSTGRES_DB: hab_qa
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://hab_user:hab_password@localhost:5432/hab_qa
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENVIRONMENT: staging
        run: cd backend && alembic upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://hab_user:hab_password@localhost:5432/hab_qa
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENVIRONMENT: staging
        run: cd backend && pytest app/tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: backend/coverage.xml
          flags: qa

  frontend-build:
    name: Frontend Build (QA)
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ENVIRONMENT: staging
        run: cd frontend && npm run build

  e2e-tests:
    name: E2E Tests (QA)
    runs-on: ubuntu-latest
    environment: qa
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: cd frontend && npm ci && npx playwright install --with-deps

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: cd frontend && npx playwright test
