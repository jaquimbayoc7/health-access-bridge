<!DOCTYPE html>

    .rel2{ fill:none; stroke:#555; stroke-width:1.5; marker-end:url(#arr); }

    /* ── Typography */
    .t-node { font:bold 13px Arial; fill:#222; }

    .t-head { font:bold 13px Arial; fill:#1a237e; }
